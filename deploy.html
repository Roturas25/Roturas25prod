var el=document.getElementById('log');
function lg(m,c){el.style.display='block';el.innerHTML+='<span class="'+(c||'i')+'">'+m+'</span>\n';el.scrollTop=el.scrollHeight;}

async function ghPut(token,branch,path,b64,msg){
  var g=await fetch('https://api.github.com/repos/'+R+'/contents/'+path+'?ref='+branch,
    {headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json','User-Agent':'R25'}});
  var gj=await g.json();
  if(gj.message&&gj.message.toLowerCase().includes('bad cred'))
    throw new Error('Token inv\u00e1lido \u2014 comprueba que tiene scope: repo');
  var body={message:msg,content:b64,branch:branch};
  if(gj.sha)body.sha=gj.sha;
  var r=await fetch('https://api.github.com/repos/'+R+'/contents/'+path,
    {method:'PUT',headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json','Content-Type':'application/json','User-Agent':'R25'},body:JSON.stringify(body)});
  var j=await r.json();
  if(r.status===200||r.status===201)return;
  if(j.message&&j.message.includes('same'))return;
  throw new Error(path+'@'+branch+': '+(j.message||'HTTP '+r.status));
}

async function go(){
  var T=document.getElementById('tok').value.trim();
  if(!T){document.getElementById('tok').focus();return;}
  var btn=document.getElementById('btn');
  btn.disabled=true;el.innerHTML='';
  lg('Deploy v18 \u2014 '+new Date().toLocaleString('es-ES'),'w');lg('','d');
  try{
    lg('  server.js \u2192 main...','d');
    await ghPut(T,'main','server.js',S,'deploy: v18 server');
    lg('  \u2713 server.js','ok');

    lg('  docs/index.html \u2192 main...','d');
    await ghPut(T,'main','docs/index.html',I,'deploy: v18 index');
    lg('  \u2713 docs/index.html (main)','ok');

    lg('  index.html \u2192 gh-pages...','d');
    await ghPut(T,'gh-pages','index.html',I,'deploy: v18 index to gh-pages');
    lg('  \u2713 index.html (gh-pages)','ok');

    lg('','d');lg('\u2713 Deploy completado','ok');lg('','d');
    lg('  Railway: ~45s \u2192 /health version:v18','i');
    lg('  GitHub Pages: ~1min \u2192 app actualizada','i');
    lg('','d');
    lg('  App: https://Roturas25.github.io/Roturas25prod/','i');
  }catch(e){
    lg('','d');lg('\u2717 '+e.message,'er');
    btn.disabled=false;
  }
}
document.getElementById('tok').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
</script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roturas25</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0c;--bg2:#111116;--bg3:#1a1a22;--bg4:#22222e;
  --border:#2a2a3a;--border2:#3a3a50;
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;
  --acc:#00d4ff;--acc2:#ff4d6a;--acc3:#00ff9d;--acc4:#ffb800;
  --win:#00c97a;--loss:#ff3a55;--neu:#7a7a9a;
  --radius:6px;--mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;min-height:100vh}
/* ── NAV ── */
#nav{
  display:flex;align-items:center;gap:0;
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 12px;position:sticky;top:0;z-index:100;height:46px;
}
#nav .logo{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;
  color:var(--acc);letter-spacing:2px;margin-right:16px;white-space:nowrap}
.tab-btn{
  background:none;border:none;color:var(--text2);cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;
  padding:0 10px;height:46px;border-bottom:2px solid transparent;
  transition:all .15s;white-space:nowrap;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--acc);border-bottom-color:var(--acc)}
#nav .spacer{flex:1}
#status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
#status-dot.ok{background:var(--win)}
#status-dot.err{background:var(--loss)}
#status-txt{font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:6px}
/* ── LAYOUT ── */
#app{max-width:1100px;margin:0 auto;padding:12px}
.tab{display:none}.tab.active{display:block}
/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.card-hdr{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-bottom:1px solid var(--border);
  font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px;
}
.card-body{padding:10px 12px}
/* ── TENNIS ROW ── */
.tc-row{display:grid;grid-template-columns:1fr auto auto auto auto auto;align-items:center;gap:6px;padding:4px 0}
.tc-name{font-weight:500;font-size:13px}
.tc-name.fav{color:var(--acc)}
.tc-set{font-family:var(--mono);font-size:12px;color:var(--text2);min-width:24px;text-align:center}
.tc-games{font-family:var(--mono);font-size:13px;font-weight:500;min-width:22px;text-align:center;
  background:var(--bg3);border-radius:3px;padding:1px 4px;color:var(--acc)}
.tc-pts{font-family:var(--mono);font-size:11px;color:var(--acc4);min-width:24px;text-align:center}
.tc-odd{font-family:var(--mono);font-size:11px;color:var(--text3);text-align:right}
.tc-alert-row{background:var(--bg3);border-left:3px solid var(--acc2);padding:5px 10px;margin:2px 0;border-radius:0 3px 3px 0;
  display:flex;align-items:center;gap:8px;font-size:12px}
.tc-alert-row .alabel{color:var(--acc2);font-weight:600;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.5px}
.tc-alert-row .abtn{
  margin-left:auto;background:var(--acc2);border:none;color:#fff;
  font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;cursor:pointer;
  font-family:'Oswald',sans-serif;letter-spacing:.5px;
}
.tc-alert-row .abtn:hover{opacity:.85}
.tc-alert-row .abtn.done{background:var(--bg4);color:var(--text3);cursor:default}
/* ── ODDS PILL ── */
.odds-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.odds-pill{
  font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px;
  border:1px solid var(--border2);color:var(--text2);background:var(--bg4);
}
.odds-pill span{color:var(--acc4);font-weight:600}
/* ── FOOTBALL ── */
.fb-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;padding:10px 12px}
.fb-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.fb-teams{font-weight:600;font-size:13px}
.fb-meta{font-size:11px;color:var(--text3);font-family:var(--mono)}
.fb-score{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--acc);margin:0 8px}
.fb-min{font-family:var(--mono);font-size:11px;color:var(--acc3);background:var(--bg3);padding:2px 6px;border-radius:3px}
.fb-alert{background:var(--bg3);border-left:3px solid var(--acc4);padding:6px 10px;border-radius:0 3px 3px 0;
  display:flex;align-items:center;gap:8px;margin-top:6px;font-size:12px}
.fb-alert .alabel{color:var(--acc4);font-weight:600;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.5px}
.fb-alert .fbtn{
  margin-left:auto;background:var(--acc4);border:none;color:#000;
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;cursor:pointer;
  font-family:'Oswald',sans-serif;letter-spacing:.5px;
}
.fb-alert .fbtn:hover{opacity:.85}
.fb-alert .fbtn.done{background:var(--bg4);color:var(--text3);cursor:default}
/* ── SIMULATOR / BT TABLES ── */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:.5px;
   color:var(--text3);padding:5px 8px;border-bottom:1px solid var(--border)}
td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;font-family:var(--mono)}
.badge.win{background:rgba(0,201,122,.15);color:var(--win);border:1px solid rgba(0,201,122,.3)}
.badge.loss{background:rgba(255,58,85,.15);color:var(--loss);border:1px solid rgba(255,58,85,.3)}
.badge.pending{background:rgba(122,122,154,.15);color:var(--neu);border:1px solid rgba(122,122,154,.3)}
.badge.tb{background:rgba(255,184,0,.15);color:var(--acc4);border:1px solid rgba(255,184,0,.3);margin-left:3px}
.badge.cat{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.stat-box .sv{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700}
.stat-box .sl{font-size:10px;color:var(--text3);letter-spacing:.5px;margin-top:2px}
.sv.pos{color:var(--win)}.sv.neg{color:var(--loss)}.sv.acc{color:var(--acc)}
/* ── CONFIG ── */
.cfg-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.cfg-row:last-child{border-bottom:none}
.cfg-row label{font-size:12px;color:var(--text2);width:160px;flex-shrink:0}
.cfg-row input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  padding:5px 8px;border-radius:3px;font-family:var(--mono);font-size:12px;width:180px}
.cfg-row input:focus{outline:1px solid var(--acc);border-color:var(--acc)}
/* ── BUTTONS ── */
.btn{
  background:var(--acc);color:#000;border:none;border-radius:3px;
  padding:6px 14px;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:.5px;cursor:pointer;transition:opacity .15s;
}
.btn:hover{opacity:.85}
.btn.danger{background:var(--loss);color:#fff}
.btn.neutral{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn.sm{padding:3px 10px;font-size:11px}
/* ── SECTION HDR ── */
.sec-hdr{
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
  font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;
  color:var(--text3);letter-spacing:1px;
}
.sec-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
/* ── LIVE DOT ── */
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--acc2);
  animation:pulse 1.2s ease-in-out infinite;display:inline-block;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* ── UPCOMING MATCH ROW ── */
.upcoming-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.upcoming-row:last-child{border-bottom:none}
.upcoming-time{font-family:var(--mono);font-size:11px;color:var(--acc3);width:45px;flex-shrink:0}
.upcoming-teams{font-size:12px;flex:1}
.upcoming-league{font-size:10px;color:var(--text3);font-family:var(--mono)}
/* ── EMPTY STATE ── */
.empty{text-align:center;padding:32px;color:var(--text3);font-size:12px;font-family:var(--mono)}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
/* ── TOAST ── */
#toast{
  position:fixed;bottom:20px;right:20px;background:var(--bg3);
  border:1px solid var(--acc);color:var(--text);
  padding:8px 14px;border-radius:var(--radius);font-size:12px;
  z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;
  font-family:var(--mono);
}
#toast.show{opacity:1}
/* ── MOBILE ── */
@media(max-width:600px){
  .tab-btn{padding:0 7px;font-size:11px}
  #app{padding:8px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div id="nav">
  <div class="logo">R25</div>
  <button class="tab-btn active" onclick="showTab('live',this)">🔴 Live</button>
  <button class="tab-btn" onclick="showTab('tennis',this)">🎾 Tenis</button>
  <button class="tab-btn" onclick="showTab('football',this)">⚽ Fútbol</button>
  <button class="tab-btn" onclick="showTab('next24',this)">📅 24h</button>
  <button class="tab-btn" onclick="showTab('sim',this)">📊 Sim</button>
  <button class="tab-btn" onclick="showTab('bt',this)">🔬 BT</button>
  <button class="tab-btn" onclick="showTab('cfg',this)">⚙️ Config</button>
  <div class="spacer"></div>
  <div id="status-dot"></div>
  <span id="status-txt">–</span>
</div>

<div id="app">

<!-- ════════════════ LIVE ════════════════ -->
<div id="tab-live" class="tab active">
  <div class="sec-hdr">ALERTAS ACTIVAS</div>
  <div id="live-alerts"></div>
  <div class="sec-hdr" style="margin-top:12px">PARTIDOS LIVE</div>
  <div id="live-matches"></div>
</div>

<!-- ════════════════ TENIS ════════════════ -->
<div id="tab-tennis" class="tab">
  <div class="sec-hdr">TENIS LIVE</div>
  <div id="tennis-live"></div>
  <div class="sec-hdr" style="margin-top:12px">PRÓXIMOS</div>
  <div id="tennis-upcoming"></div>
</div>

<!-- ════════════════ FÚTBOL ════════════════ -->
<div id="tab-football" class="tab">
  <div class="sec-hdr">FÚTBOL LIVE</div>
  <div id="football-live"></div>
</div>

<!-- ════════════════ PRÓXIMAS 24H ════════════════ -->
<div id="tab-next24" class="tab">
  <div class="sec-hdr">PARTIDOS PRÓXIMAS 24H</div>
  <div id="next24-list"></div>
</div>

<!-- ════════════════ SIMULADOR ════════════════ -->
<div id="tab-sim" class="tab">
  <div class="stats-grid" id="sim-stats"></div>
  <div class="sec-hdr">HISTORIAL SIM</div>
  <div style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>Fecha</th><th>Partido</th><th>Tipo</th>
        <th>Cuota</th><th>Stake</th>
        <th>M.Odds</th><th>S2.Odds</th><th>Set.Odds</th>
        <th>Resultado</th><th>P&L</th>
      </tr></thead>
      <tbody id="sim-table"></tbody>
    </table>
  </div>
</div>

<!-- ════════════════ BACKTEST ════════════════ -->
<div id="tab-bt" class="tab">
  <div class="stats-grid" id="bt-stats"></div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
    <select id="bt-filter-type" onchange="renderBT()" style="background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:4px 8px;border-radius:3px;font-size:12px;font-family:var(--mono)">
      <option value="">Todos los tipos</option>
      <option value="tennis_break">Break tenis</option>
      <option value="tennis_set1_set2">Set 1 → Set 2</option>
      <option value="tennis_set1_match">Set 1 → Partido</option>
      <option value="football_ht_05">Fútbol 1H +0.5</option>
      <option value="football_ht_15">Fútbol 1H +1.5</option>
      <option value="football_2h_05">Fútbol 2H +0.5</option>
      <option value="football_2h_15">Fútbol 2H +1.5</option>
    </select>
    <select id="bt-filter-surf" onchange="renderBT()" style="background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:4px 8px;border-radius:3px;font-size:12px;font-family:var(--mono)">
      <option value="">Todas las superficies</option>
      <option value="hard">Hard</option>
      <option value="clay">Clay</option>
      <option value="grass">Grass</option>
    </select>
  </div>
  <div style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>Fecha</th><th>Partido</th><th>Tipo</th>
        <th>Sup.</th><th>Cuota</th><th>Stake</th>
        <th>M.Odds</th><th>S2.Odds</th>
        <th>Resultado</th><th>TB</th><th>P&L</th>
      </tr></thead>
      <tbody id="bt-table"></tbody>
    </table>
  </div>
</div>

<!-- ════════════════ CONFIG ════════════════ -->
<div id="tab-cfg" class="tab">
  <div class="card">
    <div class="card-hdr">🔌 Servidor</div>
    <div class="card-body">
      <div class="cfg-row">
        <label>URL Servidor</label>
        <input id="cfg-server" value="https://roturas25prod-production.up.railway.app">
      </div>
      <div class="cfg-row">
        <label>Polling (seg)</label>
        <input id="cfg-interval" type="number" value="10" min="5" max="120">
      </div>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn sm" onclick="saveCfg()">Guardar</button>
        <button class="btn sm neutral" onclick="testServer()">Test conexión</button>
        <button class="btn sm danger" onclick="resetDB()">RESET DATABASE</button>
      </div>
    </div>
  </div>
  <div class="card" style="margin-top:8px">
    <div class="card-hdr">🔥 Firebase</div>
    <div class="card-body">
      <div class="cfg-row">
        <label>URL Firebase</label>
        <input id="cfg-fb" value="https://roturas25-default-rtdb.europe-west1.firebasedatabase.app">
      </div>
      <div style="margin-top:10px">
        <button class="btn sm" onclick="fbSync()">Sync Firebase</button>
      </div>
    </div>
  </div>
  <div class="card" style="margin-top:8px">
    <div class="card-hdr">💰 Stakes</div>
    <div class="card-body">
      <div class="cfg-row">
        <label>Stake Break</label>
        <input id="cfg-stake-brk" type="number" value="50">
      </div>
      <div class="cfg-row">
        <label>Stake Set 1→2</label>
        <input id="cfg-stake-s2" type="number" value="50">
      </div>
      <div class="cfg-row">
        <label>Stake Set 1→Match</label>
        <input id="cfg-stake-sm" type="number" value="50">
      </div>
      <div style="margin-top:10px">
        <button class="btn sm" onclick="saveStakes()">Guardar stakes</button>
      </div>
    </div>
  </div>
</div>

</div><!-- #app -->

<div id="toast"></div>

<script>
'use strict';
// ════════════════════════════════════════════════════
// CONFIG & STATE
// ════════════════════════════════════════════════════
const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)) } catch { return null } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

let SERVER    = LS.get('r25_server') || 'https://roturas25prod-production.up.railway.app';
let FB_URL    = LS.get('r25_fb')     || 'https://roturas25-default-rtdb.europe-west1.firebasedatabase.app';
let POLL_INT  = LS.get('r25_interval') || 10; // seconds
let STAKES    = LS.get('r25_stakes') || { brk:50, s2:50, sm:50 };

// Local state
let lastData  = null;
let bets      = LS.get('r25_bets')    || [];
let btData    = LS.get('r25_bt')      || [];
let regAlerts = new Set(LS.get('r25_regAlerts') || []);
let pollTimer = null;

const BT_ODDS = { ft05:1.80, ft15:3.00, brk:2.10, s2:1.65, sm:2.20 };
const BT_TYPES_TENNIS = ['tennis_break','tennis_set1_set2','tennis_set1_match'];
const BT_TYPES_FB     = ['football_ht_05','football_ht_15','football_2h_05','football_2h_15'];

// ════════════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════════════
function showTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tabEl = document.getElementById('tab-' + id);
  if (tabEl) tabEl.classList.add('active');
  if (btn) btn.classList.add('active');
  if (lastData) render(lastData);
  if (id === 'next24') fetchNext24();
}

// ════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════
function saveCfg() {
  SERVER   = document.getElementById('cfg-server').value.trim().replace(/\/$/,'');
  POLL_INT = Math.max(5, +document.getElementById('cfg-interval').value || 10);
  LS.set('r25_server', SERVER);
  LS.set('r25_interval', POLL_INT);
  restartPoll();
  toast('Config guardada');
}
function saveStakes() {
  STAKES = {
    brk: +document.getElementById('cfg-stake-brk').value || 50,
    s2 : +document.getElementById('cfg-stake-s2').value  || 50,
    sm : +document.getElementById('cfg-stake-sm').value  || 50
  };
  LS.set('r25_stakes', STAKES);
  toast('Stakes guardados');
}
async function testServer() {
  try {
    const r = await fetch(SERVER + '/health');
    const d = await r.json();
    toast(`OK · v10 · ${d.tennis||0} tenis · ${d.football||0} fútbol`);
  } catch { toast('❌ Sin conexión al servidor'); }
}
async function resetDB() {
  if (!confirm('¿Resetear toda la base de datos? (simAlerts, alerted, odds)')) return;
  try {
    await fetch(SERVER + '/reset', { method: 'POST' });
    // Also clear local BT
    btData = []; LS.set('r25_bt', []);
    bets   = []; LS.set('r25_bets', []);
    regAlerts.clear(); LS.set('r25_regAlerts', []);
    toast('✅ Base de datos reseteada');
    await fetchData();
  } catch { toast('❌ Error al resetear'); }
}
async function fbSync() {
  try {
    const r = await fetch(FB_URL + '/bets.json');
    const d = await r.json();
    if (d && Array.isArray(Object.values(d))) {
      toast('Firebase sincronizado');
    }
  } catch { toast('❌ Error Firebase'); }
}

// ════════════════════════════════════════════════════
// DATA FETCH & POLL
// ════════════════════════════════════════════════════
async function fetchData() {
  try {
    const r = await fetch(SERVER + '/data');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    lastData = d;
    setStatus(true, d.ts);
    syncBTFromSims(d.simAlerts || [], d.odds || {});
    render(d);
  } catch(e) {
    setStatus(false);
    showOfflineState();
  }
}

async function fetchNext24() {
  try {
    const r = await fetch(SERVER + '/football-next');
    const d = await r.json();
    renderNext24(d.matches || []);
  } catch {}
}

function restartPoll() {
  clearTimeout(pollTimer);
  schedulePoll();
}
function schedulePoll() {
  pollTimer = setTimeout(async () => {
    await fetchData();
    // If on 24h tab, also refresh it
    if (document.getElementById('tab-next24').classList.contains('active')) {
      await fetchNext24();
    }
    schedulePoll();
  }, POLL_INT * 1000);
}

// ════════════════════════════════════════════════════
// BT SYNC FROM SIMS
// ════════════════════════════════════════════════════
function syncBTFromSims(sims, odds) {
  let changed = false;
  for (const sim of sims) {
    if (!sim._bt) continue;
    if (sim._type === 'tennis_recovery') continue;

    const existing = btData.find(b => b._simId === sim._id || b._simId === sim._simId);
    if (!existing) {
      // New BT entry
      const entry = {
        _simId   : sim._id,
        _type    : sim._type,
        _odds    : sim._odds || BT_ODDS[typeToKey(sim._type)] || 2.00,
        _stake   : sim._stake || stakeFor(sim._type),
        _resolved: sim._resolved || false,
        _win     : sim._win     || null,
        _tiebreak: sim._tiebreak || false,
        odds_match  : sim.odds_match   || null,
        odds_set2   : sim.odds_set2    || null,
        odds_current: sim.odds_current || null,
        date     : sim.date       || new Date().toISOString().split('T')[0],
        tournament: sim.tournament || '',
        round    : sim.round      || '',
        surface  : sim.surface    || 'hard',
        _cat     : sim._cat       || (sim.surface || 'hard') + '_' + (sim.round || 'unknown'),
        match    : sim.match      || '',
        ts       : sim.ts         || Date.now()
      };
      btData.unshift(entry);
      changed = true;
    } else {
      // Update existing
      if (sim._resolved && !existing._resolved) {
        existing._resolved = true;
        existing._win      = sim._win;
        existing._tiebreak = sim._tiebreak || existing._tiebreak;
        if (sim.odds_match && !existing.odds_match) existing.odds_match = sim.odds_match;
        if (sim.odds_set2  && !existing.odds_set2)  existing.odds_set2  = sim.odds_set2;
        changed = true;
      }
      // Retroactive _tiebreak propagation
      if (sim._tiebreak && !existing._tiebreak) {
        existing._tiebreak = true;
        changed = true;
      }
    }
  }
  if (changed) LS.set('r25_bt', btData);
}

function typeToKey(t) {
  if (t==='tennis_break')      return 'brk';
  if (t==='tennis_set1_set2')  return 's2';
  if (t==='tennis_set1_match') return 'sm';
  if (t.includes('05'))        return 'ft05';
  if (t.includes('15'))        return 'ft15';
  return null;
}
function stakeFor(t) {
  if (t==='tennis_break')      return STAKES.brk;
  if (t==='tennis_set1_set2')  return STAKES.s2;
  if (t==='tennis_set1_match') return STAKES.sm;
  if (t.includes('05'))        return 50;
  if (t.includes('15'))        return 25;
  return 50;
}

// BT odds migration
function migrateBTOdds() {
  let changed = false;
  for (const b of btData) {
    const expected = BT_ODDS[typeToKey(b._type)];
    if (expected && b._odds !== expected) { b._odds = expected; changed = true; }
  }
  if (changed) LS.set('r25_bt', btData);
}

// ════════════════════════════════════════════════════
// TENNIS CARD
// ════════════════════════════════════════════════════
function normT(m) {
  const sc = m.scores || [];
  const sets1 = [], sets2 = [];
  let cs = 0;
  for (const s of sc) {
    const a = +(s.score_first||0), b = +(s.score_second||0);
    const done = (a>=6||b>=6) && (Math.abs(a-b)>=2 || a>=7 || b>=7);
    if (done) { sets1.push(a); sets2.push(b); cs = sets1.length; }
  }
  let g1=0, g2=0;
  const p1 = m.event_first_player_score_current_set;
  const p2 = m.event_second_player_score_current_set;
  if (p1!=null&&p2!=null){ g1=+p1; g2=+p2; }
  else if (sc[cs]){ g1=+(sc[cs].score_first||0); g2=+(sc[cs].score_second||0); }
  let pt1='',pt2='';
  if (m.event_game_result){ const pts=(m.event_game_result||'').split(' - '); pt1=pts[0]||''; pt2=pts[1]||''; }
  const fav = (m.event_home_team_odds!=null&&m.event_away_team_odds!=null)
    ? (m.event_home_team_odds<=m.event_away_team_odds?'home':'away') : 'home';
  return { sets1, sets2, g1, g2, pt1, pt2, fav, setNum: cs+1 };
}

function tCardHtml(m, oddsMap) {
  const nt = normT(m);
  const { sets1, sets2, g1, g2, pt1, pt2, fav, setNum } = nt;
  const h = m.event_home_team, a = m.event_away_team;
  const favIsHome = fav === 'home';
  const favG = favIsHome ? g1 : g2;
  const rivG = favIsHome ? g2 : g1;

  // Build sets columns
  const maxSets = Math.max(sets1.length, 1);
  const setsHdr  = Array.from({length:maxSets}, (_,i) => `<span class="tc-set">S${i+1}</span>`).join('');
  const setsHome = sets1.map((v,i) => `<span class="tc-set" style="color:${v>sets2[i]?'var(--acc3)':'var(--text3)'};">${v}</span>`).join('');
  const setsAway = sets2.map((v,i) => `<span class="tc-set" style="color:${v>sets1[i]?'var(--acc3)':'var(--text3)'};">${v}</span>`).join('');

  const matchId = String(m.event_key);
  const o = oddsMap[matchId] || {};
  const oddsHtmlStr = o.match ? `<div class="odds-row">
    ${o.match   ? `<div class="odds-pill">Match <span>${o.match.toFixed(2)}</span></div>` : ''}
    ${o.set2    ? `<div class="odds-pill">Set2 <span>${o.set2.toFixed(2)}</span></div>` : ''}
    ${o.current ? `<div class="odds-pill">Set${setNum} <span>${o.current.toFixed(2)}</span></div>` : ''}
  </div>` : '';

  // Alert?
  const isAlert = rivG > favG;
  const alertHtml = isAlert ? `<div class="tc-alert-row" style="margin:4px 0">
    <span class="alabel">⚡ BREAK</span>
    <span style="color:var(--text2);font-size:11px">${favIsHome?h:a} roto · ${favG}-${rivG}</span>
  </div>` : '';

  return `<div class="card" style="margin-bottom:6px">
    <div class="card-hdr">
      <span class="live-dot"></span>
      <span>${esc(h)} vs ${esc(a)}</span>
      <span style="color:var(--text3);font-size:11px;margin-left:4px">${esc(m.tournament_name||m.league_name||'')}</span>
    </div>
    <div class="card-body">
      <div style="display:flex;gap:4px;align-items:center;font-family:var(--mono);margin-bottom:4px">
        <span style="font-size:11px;color:var(--text3);width:140px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(h)}</span>
        ${setsHome}
        <span class="tc-games" style="${favIsHome?'':'color:var(--text2)'}">${g1}</span>
        <span class="tc-pts" style="font-size:10px">${pt1}</span>
      </div>
      <div style="display:flex;gap:4px;align-items:center;font-family:var(--mono)">
        <span style="font-size:11px;color:var(--text3);width:140px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(a)}</span>
        ${setsAway}
        <span class="tc-games" style="${!favIsHome?'':'color:var(--text2)'}">${g2}</span>
        <span class="tc-pts" style="font-size:10px">${pt2}</span>
      </div>
      ${oddsHtmlStr}
      ${alertHtml}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
// RENDER — BT TAB
// ════════════════════════════════════════════════════
function renderBT() {
  const filterType = document.getElementById('bt-filter-type')?.value || '';
  const filterSurf = document.getElementById('bt-filter-surf')?.value || '';

  let data = btData.filter(b => b._type !== 'tennis_recovery');
  if (filterType) data = data.filter(b => b._type === filterType);
  if (filterSurf) data = data.filter(b => b.surface === filterSurf);

  // Stats for filtered
  const resolved = data.filter(b => b._resolved);
  const wins   = resolved.filter(b => b._win).length;
  const losses = resolved.filter(b => !b._win).length;
  const profit = resolved.reduce((acc, b) => {
    return acc + (b._win ? (b._odds||1)*(b._stake||50)-(b._stake||50) : -(b._stake||50));
  }, 0);
  const invested = resolved.reduce((acc, b) => acc + (b._stake||50), 0);
  const roi = invested > 0 ? (profit/invested*100).toFixed(1) : '0.0';

  // Tiebreak stat (only for tennis_break)
  const tbs  = data.filter(b => b._type === 'tennis_break' && b._resolved);
  const tbCount = tbs.filter(b => b._tiebreak).length;
  const tbWins  = tbs.filter(b => b._tiebreak && b._win).length;
  const tbLoss  = tbs.filter(b => b._tiebreak && !b._win).length;

  const profitColor = profit >= 0 ? 'pos' : 'neg';
  document.getElementById('bt-stats').innerHTML = `
    <div class="stat-box"><div class="sv ${profitColor}">${profit>=0?'+':''}${profit.toFixed(2)}€</div><div class="sl">PROFIT</div></div>
    <div class="stat-box"><div class="sv ${profitColor}">${roi}%</div><div class="sl">ROI</div></div>
    <div class="stat-box"><div class="sv" style="color:var(--win)">${wins}</div><div class="sl">WINS</div></div>
    <div class="stat-box"><div class="sv" style="color:var(--loss)">${losses}</div><div class="sl">LOSSES</div></div>
    <div class="stat-box"><div class="sv">${data.filter(b=>!b._resolved).length}</div><div class="sl">PENDIENTES</div></div>
    ${tbs.length ? `<div class="stat-box"><div class="sv" style="color:var(--acc4)">${tbCount}/${tbs.length}</div><div class="sl">TIEBREAKS · ${tbWins}W ${tbLoss}L</div></div>` : ''}
  `;

  const tbody = document.getElementById('bt-table');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="11" class="empty">Sin datos BT</td></tr>'; return; }

  tbody.innerHTML = data.map(b => {
    const pnl = b._resolved
      ? (b._win ? '+' + ((b._odds||1)*(b._stake||50)-(b._stake||50)).toFixed(2) : '-' + (b._stake||50).toFixed(2))
      : '–';
    const pnlColor = b._resolved ? (b._win ? 'var(--win)' : 'var(--loss)') : 'var(--text3)';
    const surfColor = { hard:'var(--acc)', clay:'#d97700', grass:'var(--acc3)' }[b.surface] || 'var(--text3)';
    return `<tr>
      <td style="font-family:var(--mono);font-size:10px;color:var(--text3)">${b.date||''}</td>
      <td style="max-width:140px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:12px">${esc(b.match||'')}</td>
      <td><span class="badge cat">${simTypeShort(b._type)}</span></td>
      <td style="font-family:var(--mono);font-size:11px;color:${surfColor}">${b.surface||'–'}</td>
      <td style="font-family:var(--mono)">${b._odds||'?'}x</td>
      <td style="font-family:var(--mono)">${b._stake||50}€</td>
      <td style="font-family:var(--mono);color:var(--acc4)">${b.odds_match ? b.odds_match.toFixed(2) : '–'}</td>
      <td style="font-family:var(--mono);color:var(--acc4)">${b.odds_set2  ? b.odds_set2.toFixed(2)  : '–'}</td>
      <td>${b._resolved
        ? `<span class="badge ${b._win?'win':'loss'}">${b._win?'WIN':'LOSS'}</span>`
        : '<span class="badge pending">PEND</span>'}</td>
      <td>${b._tiebreak ? '<span class="badge tb">TB</span>' : '–'}</td>
      <td style="font-family:var(--mono);color:${pnlColor};font-weight:600">${pnl}</td>
    </tr>`;
  }).join('');
}

// ALERT REGISTRATION
// ════════════════════════════════════════════════════
function regAlert(simId, type, btn) {
  if (regAlerts.has(simId)) return;
  regAlerts.add(simId);
  LS.set('r25_regAlerts', [...regAlerts]);
  if (btn) { btn.textContent = '✓ OK'; btn.classList.add('done'); }
  toast('Apuesta registrada');
}

function regFbAlert(simId, matchId, btn) {
  if (regAlerts.has(simId)) return;
  regAlerts.add(simId);
  LS.set('r25_regAlerts', [...regAlerts]);
  // Register two bets: +0.5 and +1.5
  const key05 = `${simId}_05`;
  const key15 = `${simId}_15`;
  if (!regAlerts.has(key05) && !regAlerts.has(key15)) {
    // Already added parent key, sub-keys for tracking
    regAlerts.add(key05); regAlerts.add(key15);
    LS.set('r25_regAlerts', [...regAlerts]);
  }
  if (btn) { btn.textContent = '✓'; btn.classList.add('done'); }
  toast('Apuesta fútbol registrada · +0.5 y +1.5');
}

function oddsRowHtml(sim, o) {
  const m  = sim.odds_match   || o.match   || null;
  const s2 = sim.odds_set2    || o.set2    || null;
  const sc = sim.odds_current || o.current || null;
  if (!m && !s2 && !sc) return '';
  return `<div class="odds-row">
    ${m  ? `<div class="odds-pill">Match <span>${m.toFixed(2)}</span></div>`  : ''}
    ${s2 ? `<div class="odds-pill">Set2 <span>${s2.toFixed(2)}</span></div>` : ''}
    ${sc ? `<div class="odds-pill">SetAct <span>${sc.toFixed(2)}</span></div>` : ''}
  </div>`;
}

// ════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function simTypeLabel(t) {
  const map = {
    tennis_break       : '⚡ BREAK',
    tennis_recovery    : '↩ RECOVERY',
    tennis_set1_set2   : '📉 SET1→S2',
    tennis_set1_match  : '📉 SET1→WIN',
    football_ht_05     : '⚽ 1H +0.5',
    football_ht_15     : '⚽ 1H +1.5',
    football_2h_05     : '⚽ 2H +0.5',
    football_2h_15     : '⚽ 2H +1.5',
  };
  return map[t] || t;
}
function simTypeShort(t) {
  const map = {
    tennis_break       : 'BRK',
    tennis_recovery    : 'REC',
    tennis_set1_set2   : 'S1→S2',
    tennis_set1_match  : 'S1→W',
    football_ht_05     : '1H+0.5',
    football_ht_15     : '1H+1.5',
    football_2h_05     : '2H+0.5',
    football_2h_15     : '2H+1.5',
  };
  return map[t] || t;
}

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
(function init() {
  migrateBTOdds();

  // Set config fields
  document.getElementById('cfg-server').value    = SERVER;
  document.getElementById('cfg-interval').value  = POLL_INT;
  document.getElementById('cfg-fb').value        = FB_URL;
  document.getElementById('cfg-stake-brk').value = STAKES.brk;
  document.getElementById('cfg-stake-s2').value  = STAKES.s2;
  document.getElementById('cfg-stake-sm').value  = STAKES.sm;

  // Show loading state immediately
  const loadingMsg = '<div class="empty">Conectando con el servidor...</div>';
  ['live-alerts','live-matches','tennis-live','football-live'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = loadingMsg;
  });

  // Initial fetch + poll
  fetchData();
  schedulePoll();
})();
</script>
